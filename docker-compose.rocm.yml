services:
  llama-toolchest:
    build:
      context: .
      dockerfile: Dockerfile.rocm
      args:
        # setup.sh resolves the latest release tag from GH and exports
        # LLAMA_TOOLCHEST_VERSION before invoking compose, so this build
        # arg pins the .rpm being installed. Only the package-install
        # layer's cache invalidates when the version changes — ROCm SDK
        # layers stay cached. Falls back to "latest" if unset, in which
        # case the Dockerfile resolves it at build time itself.
        LLAMA_TOOLCHEST_VERSION: "${LLAMA_TOOLCHEST_VERSION:-latest}"
    container_name: llama-toolchest
    ports:
      - "${LLAMA_TOOLCHEST_PORT:-3000}:3000"   # llama-toolchest management UI
      - "${LLAMA_TOOLCHEST_INFERENCE_PORT:-8080}:8080"   # llama-server router (chat UI + inference)
    volumes:
      - llama-toolchest-data:/data:z
    devices:
      - /dev/kfd:/dev/kfd       # AMD GPU kernel interface
      - /dev/dri:/dev/dri       # DRM render nodes
    group_add:
      - "${HOST_VIDEO_GID:-video}"
      - "${HOST_RENDER_GID:-render}"
    ipc: host                    # ROCm needs shared memory for GPU communication
    security_opt:
      - seccomp=unconfined      # required for ROCm
    ulimits:
      memlock:
        soft: -1
        hard: -1
    env_file:
      - path: .env
        required: false
    environment:
      # LLAMA_TOOLCHEST_MODELS_DIR is a host-side bind-mount source for
      # docker-compose.models.yml, NOT a container path. Blank it here so
      # the runtime never reads a host path out of the container env and
      # mistakes it for an in-container directory (which used to send
      # downloads into the container's writable layer — lost on rebuild).
      LLAMA_TOOLCHEST_MODELS_DIR: ""
    restart: unless-stopped

volumes:
  llama-toolchest-data:
    name: llama-toolchest-data
    driver: local
