{{define "content"}}
<style>
    .server-page {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 3rem);
    }
    .server-controls {
        flex-shrink: 0;
    }
    .server-page .resize-handle {
        flex-shrink: 0;
        height: 6px;
        cursor: row-resize;
        background: var(--pico-muted-border-color);
        border-radius: 3px;
        margin: 2px 0;
        transition: background 0.15s;
    }
    .server-page .resize-handle:hover,
    .server-page .resize-handle.dragging {
        background: var(--pico-primary);
    }
    .server-page .log-section {
        flex: 1;
        min-height: 80px;
        overflow: hidden;
    }
    .server-page .log-section .log-panel {
        margin: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
    }
    .server-page .log-section .log-panel pre {
        flex: 1;
        max-height: none;
        overflow-y: auto;
        font-size: 0.85rem;
        margin: 0;
    }
</style>

<div class="server-page">
    <div class="server-controls">
        <div class="grid">
            <article>
                <header>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>Inference Server</span>
                        <div id="server-status"
                             hx-get="/api/service/status"
                             hx-trigger="load, every 5s"
                             hx-swap="innerHTML"
                             hx-on::before-swap="if(event.detail.xhr.responseText===this.innerHTML){event.detail.shouldSwap=false;}">
                        </div>
                    </div>
                </header>

                <form id="server-settings-form"
                      hx-put="/api/settings"
                      hx-target="#build-save-status"
                      hx-swap="innerHTML"
                      hx-trigger="change delay:500ms">
                    <div class="grid">
                        <label>
                            Build
                            <select name="active_build">
                                <option value="" {{if eq .ActiveBuild ""}}selected{{end}}>Auto (first available)</option>
                                {{range .AvailableBuilds}}
                                <option value="{{.ID}}" {{if eq .ID $.ActiveBuild}}selected{{end}}>
                                    {{.ID}} ({{.Profile}})
                                </option>
                                {{end}}
                            </select>
                        </label>
                        <label>
                            Max Loaded Models
                            <input type="number" name="models_max" value="{{.ModelsMax}}" min="0"
                                   placeholder="0 = unlimited">
                        </label>
                    </div>
                </form>
                <div id="build-save-status"></div>

                <div role="group">
                    <button type="button"
                            hx-post="/api/service/start"
                            hx-target="#server-status"
                            hx-swap="innerHTML">
                        Start
                    </button>
                    <button type="button" class="secondary"
                            hx-post="/api/service/stop"
                            hx-target="#server-status"
                            hx-swap="innerHTML">
                        Stop
                    </button>
                    <button type="button" class="outline"
                            onclick="htmx.ajax('PUT','/api/settings',{source:document.getElementById('server-settings-form')}).then(function(){htmx.ajax('POST','/api/service/restart',{target:'#server-status',swap:'innerHTML'});});">
                        Restart
                    </button>
                </div>

                <div id="loaded-models"
                     hx-get="/api/service/loaded-models"
                     hx-trigger="load, every 5s"
                     hx-swap="innerHTML">
                </div>
            </article>
        </div>
    </div>

    <div class="resize-handle" title="Drag to resize"></div>

    <div class="log-section">
        <article class="log-panel">
            <header>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Server Logs</span>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <label style="margin: 0; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
                            Live tail
                            <input type="checkbox" class="log-tail-toggle" role="switch" checked
                                   style="margin: 0;">
                        </label>
                        <button type="button" class="log-copy-btn outline secondary"
                                style="margin: 0; padding: 0.25rem 0.75rem; font-size: 0.8rem;">
                            Copy
                        </button>
                        <button type="button" class="log-clear-btn outline secondary"
                                style="margin: 0; padding: 0.25rem 0.75rem; font-size: 0.8rem;">
                            Clear
                        </button>
                    </div>
                </div>
            </header>
            <pre id="service-logs"></pre>
        </article>
    </div>
</div>

<script>
(function() {
    // --- Resize handle ---
    const handle = document.querySelector('.server-page .resize-handle');
    const logSection = document.querySelector('.server-page .log-section');
    const page = document.querySelector('.server-page');

    handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        handle.classList.add('dragging');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', onRelease);
    });

    function onDrag(e) {
        // Log section height = bottom of page minus cursor position minus handle height
        var pageRect = page.getBoundingClientRect();
        var newH = pageRect.bottom - e.clientY - handle.offsetHeight;
        newH = Math.max(80, Math.min(newH, pageRect.height - 200));
        logSection.style.flex = 'none';
        logSection.style.height = newH + 'px';
    }

    function onRelease() {
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', onRelease);
    }

    // --- Server log stream ---
    var logSSE = new EventSource('/api/service/logs');
    logSSE.onmessage = function(e) {
        var pre = document.getElementById('service-logs');
        pre.textContent += e.data;
        var toggle = document.querySelector('.log-tail-toggle');
        if (toggle && toggle.checked) {
            pre.scrollTop = pre.scrollHeight;
        }
    };
    logSSE.addEventListener('done', function() {
        logSSE.close();
    });
})();
</script>
{{end}}
