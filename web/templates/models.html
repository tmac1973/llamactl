{{define "content"}}
<div style="display: flex; justify-content: flex-end; gap: 0.5rem; padding: 0 0.25rem 0.5rem 0;">
    <button type="button" class="outline secondary"
            style="margin: 0; padding: 0.2rem 0.6rem; font-size: 0.8rem;"
            hx-post="/api/models/scan"
            hx-target="#model-list"
            hx-swap="innerHTML"
            title="Scan the models directory for GGUF files not yet in the registry">
        Scan for Models
    </button>
</div>

<div id="gpu-map"
     hx-get="/api/gpu-map"
     hx-trigger="load, gpuMapChanged from:body"
     hx-swap="innerHTML">
</div>

<div id="active-downloads"
     hx-get="/api/hf/downloads"
     hx-trigger="load, every 3s"
     hx-swap="innerHTML"
     hx-on::before-swap="if(event.detail.xhr.responseText===this.innerHTML){event.detail.shouldSwap=false;}">
</div>

<div id="model-list" hx-get="/api/models" hx-trigger="load" hx-swap="innerHTML">
    Loading...
</div>

<hr>
<div style="display: flex; justify-content: space-between; align-items: center; padding: 0 0.25rem 0.5rem 0;">
    <h4 style="margin:0;">Embedding Models</h4>
    <button type="button" class="outline" id="embedding-presets-btn"
            style="margin: 0; padding: 0.2rem 0.6rem; font-size: 0.8rem;"
            onclick="var t=document.getElementById('embedding-presets'); if(t.innerHTML.trim()){t.innerHTML='';} else {htmx.ajax('GET','/api/models/embedding-presets',{target:'#embedding-presets',swap:'innerHTML'});}">
        Get Embedding Models
    </button>
</div>
<div id="embedding-presets"></div>
<div id="embedding-list" hx-get="/api/models/embeddings" hx-trigger="load" hx-swap="innerHTML">
</div>

<script>
(function() {
    // --- VRAM estimate update from config save ---
    document.body.addEventListener('vramUpdated', function(e) {
        var detail = e.detail;
        if (detail && detail.id && detail.vram) {
            var cell = document.getElementById('vram-' + detail.id);
            if (cell) cell.textContent = detail.vram;
        }
    });
})();

// --- Model list: toggle org/base-model groups ---
// Uses dataset string comparison rather than attribute-selector querySelector
// so org/base names containing CSS-special chars can't break the lookup.
function toggleGroup(header) {
    if (!header) return;
    var collapsed = header.classList.toggle('collapsed');
    var caret = header.querySelector('.caret');
    if (caret) caret.textContent = collapsed ? '▸' : '▾';

    var root = header.parentElement;
    if (!root) return;

    var headerOrg = header.dataset.org || '';
    var headerBase = header.dataset.base || '';

    if (header.classList.contains('base-header')) {
        root.querySelectorAll('tbody.base-col-header, tbody.model-row-group').forEach(function(tb) {
            if ((tb.dataset.org || '') === headerOrg && (tb.dataset.base || '') === headerBase) {
                tb.style.display = collapsed ? 'none' : '';
            }
        });
        return;
    }

    if (header.classList.contains('org-header')) {
        // Build a map of (base -> collapsed) for this org so each row in the
        // org can derive its visibility from its base's current state.
        var baseCollapsedMap = {};
        root.querySelectorAll('tbody.base-header').forEach(function(bh) {
            if ((bh.dataset.org || '') !== headerOrg) return;
            baseCollapsedMap[bh.dataset.base || ''] = bh.classList.contains('collapsed');
            bh.style.display = collapsed ? 'none' : '';
        });
        root.querySelectorAll('tbody.base-col-header, tbody.model-row-group').forEach(function(tb) {
            if ((tb.dataset.org || '') !== headerOrg) return;
            if (collapsed) {
                tb.style.display = 'none';
                return;
            }
            tb.style.display = baseCollapsedMap[tb.dataset.base || ''] ? 'none' : '';
        });
    }
}

// --- Model list: collapse / expand all ---
function collapseAllGroups() {
    var root = document.getElementById('model-list');
    if (!root) return;
    // Collapse bases first so re-expanding an org doesn't reveal their rows.
    root.querySelectorAll('tbody.base-header').forEach(function(bh) {
        if (!bh.classList.contains('collapsed')) toggleGroup(bh);
    });
    root.querySelectorAll('tbody.org-header').forEach(function(oh) {
        if (!oh.classList.contains('collapsed')) toggleGroup(oh);
    });
}
function expandAllGroups() {
    var root = document.getElementById('model-list');
    if (!root) return;
    // Expand orgs first so base-headers become visible, then expand bases.
    root.querySelectorAll('tbody.org-header').forEach(function(oh) {
        if (oh.classList.contains('collapsed')) toggleGroup(oh);
    });
    root.querySelectorAll('tbody.base-header').forEach(function(bh) {
        if (bh.classList.contains('collapsed')) toggleGroup(bh);
    });
}

// --- Model list: text filter ---
function filterModels(q) {
    q = (q || '').trim().toLowerCase();
    var root = document.getElementById('model-list');
    if (!root) return;

    var rows = root.querySelectorAll('tbody.model-row-group');
    var orgHeaders = root.querySelectorAll('tbody.org-header');
    var baseHeaders = root.querySelectorAll('tbody.base-header');
    var colHeaders = root.querySelectorAll('tbody.base-col-header');

    var matchingByBase = {};
    var matchingByOrg = {};

    rows.forEach(function(tb) {
        var matches = !q || (tb.dataset.search || '').indexOf(q) !== -1;
        tb._matches = matches;
        if (matches) {
            var key = (tb.dataset.org || '') + '||' + (tb.dataset.base || '');
            matchingByBase[key] = true;
            matchingByOrg[tb.dataset.org || ''] = true;
        }
    });

    var setExpanded = function(header, expanded) {
        if (expanded) header.classList.remove('collapsed');
        else header.classList.add('collapsed');
        var caret = header.querySelector('.caret');
        if (caret) caret.textContent = expanded ? '▾' : '▸';
    };

    // When filtering, expand matching groups and collapse the rest so the
    // visible rows are actually revealed. When cleared, leave user-driven
    // collapse state alone.
    if (q) {
        orgHeaders.forEach(function(oh) {
            setExpanded(oh, !!matchingByOrg[oh.dataset.org || '']);
        });
        baseHeaders.forEach(function(bh) {
            var key = (bh.dataset.org || '') + '||' + (bh.dataset.base || '');
            setExpanded(bh, !!matchingByBase[key]);
        });
    }

    var orgCollapsed = {};
    orgHeaders.forEach(function(oh) {
        orgCollapsed[oh.dataset.org || ''] = oh.classList.contains('collapsed');
    });
    var baseCollapsed = {};
    baseHeaders.forEach(function(bh) {
        var key = (bh.dataset.org || '') + '||' + (bh.dataset.base || '');
        baseCollapsed[key] = bh.classList.contains('collapsed');
    });

    orgHeaders.forEach(function(oh) {
        var org = oh.dataset.org || '';
        oh.style.display = (!q || matchingByOrg[org]) ? '' : 'none';
    });
    baseHeaders.forEach(function(bh) {
        var org = bh.dataset.org || '';
        var key = org + '||' + (bh.dataset.base || '');
        var match = !q || matchingByBase[key];
        bh.style.display = (match && !orgCollapsed[org]) ? '' : 'none';
    });
    colHeaders.forEach(function(ch) {
        var org = ch.dataset.org || '';
        var base = ch.dataset.base || '';
        var key = org + '||' + base;
        var match = !q || matchingByBase[key];
        ch.style.display = (match && !orgCollapsed[org] && !baseCollapsed[key]) ? '' : 'none';
    });
    rows.forEach(function(tb) {
        var org = tb.dataset.org || '';
        var base = tb.dataset.base || '';
        var key = org + '||' + base;
        tb.style.display = (tb._matches && !orgCollapsed[org] && !baseCollapsed[key]) ? '' : 'none';
    });
}
</script>
{{end}}
