{{define "content"}}
<div style="display: flex; justify-content: flex-end; gap: 0.5rem; padding: 0 0.25rem 0.5rem 0;">
    <button type="button" class="outline secondary"
            style="margin: 0; padding: 0.2rem 0.6rem; font-size: 0.8rem;"
            hx-post="/api/models/scan"
            hx-target="#model-list"
            hx-swap="innerHTML"
            title="Scan the models directory for GGUF files not yet in the registry">
        Scan for Models
    </button>
</div>

<div id="gpu-map"
     hx-get="/api/gpu-map"
     hx-trigger="load, gpuMapChanged from:body"
     hx-swap="innerHTML">
</div>

<div id="active-downloads"
     hx-get="/api/hf/downloads"
     hx-trigger="load, every 3s"
     hx-swap="innerHTML"
     hx-on::before-swap="if(event.detail.xhr.responseText===this.innerHTML){event.detail.shouldSwap=false;}">
</div>

<div id="model-list" hx-get="/api/models" hx-trigger="load" hx-swap="innerHTML">
    Loading...
</div>

<hr>
<div style="display: flex; justify-content: space-between; align-items: center; padding: 0 0.25rem 0.5rem 0;">
    <h4 style="margin:0;">Embedding Models</h4>
    <button type="button" class="outline" id="embedding-presets-btn"
            style="margin: 0; padding: 0.2rem 0.6rem; font-size: 0.8rem;"
            onclick="var t=document.getElementById('embedding-presets'); if(t.innerHTML.trim()){t.innerHTML='';} else {htmx.ajax('GET','/api/models/embedding-presets',{target:'#embedding-presets',swap:'innerHTML'});}">
        Get Embedding Models
    </button>
</div>
<div id="embedding-presets"></div>
<div id="embedding-list" hx-get="/api/models/embeddings" hx-trigger="load" hx-swap="innerHTML">
</div>

<script>
(function() {
    // --- VRAM estimate update from config save ---
    document.body.addEventListener('vramUpdated', function(e) {
        var detail = e.detail;
        if (detail && detail.id && detail.vram) {
            var cell = document.getElementById('vram-' + detail.id);
            if (cell) cell.textContent = detail.vram;
        }
    });
})();

// --- Model list: toggle org/base-model groups ---
function toggleGroup(header) {
    if (!header) return;
    var collapsed = header.classList.toggle('collapsed');
    var caret = header.querySelector('.caret');
    if (caret) caret.textContent = collapsed ? '▸' : '▾';

    var org = header.dataset.org;
    var base = header.dataset.base;
    var root = header.parentElement;
    if (!root) return;

    var orgSel = '[data-org="' + CSS.escape(org) + '"]';

    if (header.classList.contains('base-header')) {
        var baseSel = orgSel + '[data-base="' + CSS.escape(base) + '"]';
        root.querySelectorAll('tbody.base-col-header' + baseSel + ', tbody.model-row-group' + baseSel).forEach(function(tb) {
            tb.style.display = collapsed ? 'none' : '';
        });
        return;
    }

    if (header.classList.contains('org-header')) {
        // Base headers follow the org's state directly.
        root.querySelectorAll('tbody.base-header' + orgSel).forEach(function(bh) {
            bh.style.display = collapsed ? 'none' : '';
        });
        // Column headers + model rows: hide everything when collapsing;
        // when expanding, only reveal those whose base-header is NOT collapsed.
        root.querySelectorAll('tbody.base-col-header' + orgSel + ', tbody.model-row-group' + orgSel).forEach(function(tb) {
            if (collapsed) {
                tb.style.display = 'none';
                return;
            }
            var bh = root.querySelector('tbody.base-header' + orgSel +
                '[data-base="' + CSS.escape(tb.dataset.base) + '"]');
            var baseCollapsed = bh && bh.classList.contains('collapsed');
            tb.style.display = baseCollapsed ? 'none' : '';
        });
    }
}

// --- Model list: collapse / expand all orgs ---
function collapseAllGroups() {
    var root = document.getElementById('model-list');
    if (!root) return;
    root.querySelectorAll('tbody.org-header').forEach(function(oh) {
        if (!oh.classList.contains('collapsed')) toggleGroup(oh);
    });
}
function expandAllGroups() {
    var root = document.getElementById('model-list');
    if (!root) return;
    root.querySelectorAll('tbody.org-header').forEach(function(oh) {
        if (oh.classList.contains('collapsed')) toggleGroup(oh);
    });
}

// --- Model list: text filter ---
function filterModels(q) {
    q = (q || '').trim().toLowerCase();
    var root = document.getElementById('model-list');
    if (!root) return;

    var rows = root.querySelectorAll('tbody.model-row-group');
    var visibleByBase = {}; // org||base -> count
    var visibleByOrg = {};  // org -> count

    rows.forEach(function(tb) {
        var show = !q || (tb.dataset.search || '').indexOf(q) !== -1;
        tb.style.display = show ? '' : 'none';
        if (show) {
            var key = (tb.dataset.org || '') + '||' + (tb.dataset.base || '');
            visibleByBase[key] = (visibleByBase[key] || 0) + 1;
            visibleByOrg[tb.dataset.org || ''] = (visibleByOrg[tb.dataset.org || ''] || 0) + 1;
        }
    });

    // Show/hide group headers + per-group column headers; auto-expand on filter
    root.querySelectorAll('tbody.base-header').forEach(function(bh) {
        var key = (bh.dataset.org || '') + '||' + (bh.dataset.base || '');
        var has = !!visibleByBase[key];
        bh.style.display = has ? '' : 'none';
        if (q && has && bh.classList.contains('collapsed')) {
            toggleGroup(bh);
        }
    });
    root.querySelectorAll('tbody.base-col-header').forEach(function(ch) {
        var key = (ch.dataset.org || '') + '||' + (ch.dataset.base || '');
        ch.style.display = visibleByBase[key] ? '' : 'none';
    });
    root.querySelectorAll('tbody.org-header').forEach(function(oh) {
        var has = !!visibleByOrg[oh.dataset.org || ''];
        oh.style.display = has ? '' : 'none';
        if (q && has && oh.classList.contains('collapsed')) {
            toggleGroup(oh);
        }
    });
}
</script>
{{end}}
