{{define "content"}}
<style>
    .models-page {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 3rem);
    }
    .models-page .models-list {
        flex: 1;
        overflow-y: auto;
        min-height: 100px;
    }
    .models-page .resize-handle {
        flex-shrink: 0;
        height: 6px;
        cursor: row-resize;
        background: var(--pico-muted-border-color);
        border-radius: 3px;
        margin: 2px 0;
        transition: background 0.15s;
    }
    .models-page .resize-handle:hover,
    .models-page .resize-handle.dragging {
        background: var(--pico-primary);
    }
    .models-page .log-section {
        flex-shrink: 0;
        min-height: 80px;
        overflow: hidden;
    }
    .models-page .log-section .log-panel {
        margin: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
    }
    .models-page .log-section .log-panel pre {
        flex: 1;
        max-height: none;
        overflow-y: auto;
        font-size: 0.85rem;
        margin: 0;
    }
    ul.log-tabs {
        display: flex;
        gap: 0;
        margin: 0;
        padding: 0;
        padding-left: 0;
        list-style: none;
        list-style-type: none;
    }
    ul.log-tabs li {
        margin: 0;
        padding: 0;
        list-style: none;
        list-style-type: none;
    }
    ul.log-tabs li::marker {
        content: none;
    }
    .log-tabs li a {
        display: block;
        padding: 0.25rem 0.75rem;
        font-size: 0.8rem;
        text-decoration: none;
        border-bottom: 2px solid transparent;
        color: var(--pico-muted-color);
        cursor: pointer;
    }
    .log-tabs li a:hover {
        color: var(--pico-color);
    }
    .log-tabs li a.active {
        color: var(--pico-primary);
        border-bottom-color: var(--pico-primary);
    }
    .log-empty-msg {
        color: var(--pico-muted-color);
        font-style: italic;
        padding: 1rem;
        font-size: 0.85rem;
    }
</style>

<div class="models-page">
    <div class="models-list">
        <div style="display: flex; justify-content: flex-end; padding: 0 0.25rem 0.25rem 0;">
            <button type="button" class="outline secondary"
                    style="margin: 0; padding: 0.2rem 0.6rem; font-size: 0.8rem;"
                    hx-post="/api/models/scan"
                    hx-target="#model-list"
                    hx-swap="innerHTML"
                    title="Scan the models directory for GGUF files not yet in the registry">
                Scan for Models
            </button>
        </div>
        <div id="active-downloads"
             hx-get="/api/hf/downloads"
             hx-trigger="load, every 3s"
             hx-swap="innerHTML"
             hx-on::before-swap="if(event.detail.xhr.responseText===this.innerHTML){event.detail.shouldSwap=false;}">
        </div>
        <div id="model-list" hx-get="/api/models" hx-trigger="load" hx-swap="innerHTML">
            Loading...
        </div>
    </div>

    <div class="resize-handle" title="Drag to resize"></div>

    <div class="log-section" style="height: 300px;">
        <article class="log-panel">
            <header>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <span>Server Logs</span>
                        <ul class="log-tabs" id="log-tabs"
                            hx-get="/api/service/log-tabs"
                            hx-trigger="load, every 5s"
                            hx-swap="innerHTML"
                            hx-on::before-swap="if(event.detail.xhr.responseText===this.innerHTML){event.detail.shouldSwap=false;}">
                        </ul>
                    </div>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <label style="margin: 0; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
                            Live tail
                            <input type="checkbox" class="log-tail-toggle" role="switch" checked
                                   style="margin: 0;">
                        </label>
                        <button type="button" class="log-copy-btn outline secondary"
                                style="margin: 0; padding: 0.25rem 0.75rem; font-size: 0.8rem;">
                            Copy
                        </button>
                    </div>
                </div>
            </header>
            <pre id="service-logs">
                <span class="log-empty-msg">No active models. Start a model to see logs.</span>
            </pre>
        </article>
    </div>
</div>

<script>
(function() {
    // --- Resize handle ---
    const handle = document.querySelector('.models-page .resize-handle');
    const logSection = document.querySelector('.models-page .log-section');
    const page = document.querySelector('.models-page');
    let startY, startH;

    handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        startY = e.clientY;
        startH = logSection.offsetHeight;
        handle.classList.add('dragging');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', onRelease);
    });

    function onDrag(e) {
        const delta = startY - e.clientY;
        const newH = Math.max(80, Math.min(startH + delta, page.offsetHeight - 200));
        logSection.style.height = newH + 'px';
    }

    function onRelease() {
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', onRelease);
    }

    // --- Log tab switching ---
    var currentSSE = null;
    var currentModelID = null;

    window.switchLogTab = function(modelID) {
        // Update tab active state
        document.querySelectorAll('#log-tabs a').forEach(function(a) {
            a.classList.toggle('active', a.dataset.model === modelID);
        });

        // Don't reconnect if already on this tab
        if (modelID === currentModelID) return;
        currentModelID = modelID;

        // Close existing SSE connection
        if (currentSSE) {
            currentSSE.close();
            currentSSE = null;
        }

        var pre = document.getElementById('service-logs');
        pre.innerHTML = '';

        if (!modelID) return;

        // Open new SSE connection
        currentSSE = new EventSource('/api/service/logs?model=' + encodeURIComponent(modelID));
        currentSSE.onmessage = function(e) {
            pre.textContent += e.data;
            // Auto-scroll if live tail is on
            var toggle = document.querySelector('.log-tail-toggle');
            if (toggle && toggle.checked) {
                pre.scrollTop = pre.scrollHeight;
            }
        };
        currentSSE.addEventListener('done', function() {
            currentSSE.close();
            currentSSE = null;
        });
        currentSSE.onerror = function() {
            // EventSource auto-reconnects, but if the instance is gone, stop
            if (currentSSE) {
                currentSSE.close();
                currentSSE = null;
            }
        };
    };

    // When log-tabs are refreshed via htmx, auto-select the current tab
    // or the first tab if the current one disappeared.
    document.getElementById('log-tabs').addEventListener('htmx:afterSwap', function() {
        var tabs = document.querySelectorAll('#log-tabs a');
        if (tabs.length === 0) {
            // No active models
            if (currentSSE) { currentSSE.close(); currentSSE = null; }
            currentModelID = null;
            document.getElementById('service-logs').innerHTML =
                '<span class="log-empty-msg">No active models. Start a model to see logs.</span>';
            return;
        }

        // Check if current tab still exists
        var stillExists = false;
        tabs.forEach(function(a) {
            if (a.dataset.model === currentModelID) stillExists = true;
        });

        if (!stillExists) {
            // Switch to first available tab
            currentModelID = null; // force reconnect
            switchLogTab(tabs[0].dataset.model);
        } else {
            // Re-mark the active tab (htmx replaced the HTML)
            tabs.forEach(function(a) {
                a.classList.toggle('active', a.dataset.model === currentModelID);
            });
        }
    });
    // --- VRAM estimate update from config save ---
    document.body.addEventListener('vramUpdated', function(e) {
        var detail = e.detail;
        if (detail && detail.id && detail.vram) {
            var cell = document.getElementById('vram-' + detail.id);
            if (cell) cell.textContent = detail.vram;
        }
    });
})();
</script>
{{end}}
