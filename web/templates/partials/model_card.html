{{define "model_card"}}
<tbody class="model-row-group">
<tr{{if .IsOrphan}} style="opacity: 0.6;"{{else if .IsActive}} style="background: var(--pico-primary-background); color: var(--pico-primary-inverse);"{{end}}>
    <td>
        {{.ModelID}}
        {{if .IsActive}} <ins>active</ins>{{end}}
        {{if .IsOrphan}} <del>missing</del>{{end}}
    </td>
    <td><kbd>{{.Quant}}</kbd></td>
    <td id="vram-{{.ID}}" title="Base (weights + overhead) - Peak (full KV cache)">{{printf "%.1f" .BaseVRAMGB}} - {{printf "%.1f" .PeakVRAMGB}} GB</td>
    <td>{{printf "%.1f" (divGB .SizeBytes)}} GB</td>
    <td>
        {{if .IsOrphan}}
        <div role="group">
            <button type="button" class="outline secondary"
                    hx-delete="/api/models/{{.ID}}?keep_files=true"
                    hx-confirm="Remove this entry from the registry? (files are already missing)"
                    hx-target="closest .model-row-group"
                    hx-swap="outerHTML">
                Remove Entry
            </button>
            <button type="button" class="outline"
                    hx-post="/api/hf/download"
                    hx-vals='{"model_id":"{{.ModelID}}","filename":"{{.Filename}}"}'
                    hx-target="closest .model-row-group"
                    hx-swap="afterend">
                Re-download
            </button>
        </div>
        {{else if .IsActive}}
        <div role="group">
            <button type="button" class="outline"
                    hx-get="/api/models/{{.ID}}/config"
                    hx-target="next .config-cell"
                    hx-swap="innerHTML"
                    hx-on::before-request="let t=this.closest('tr').nextElementSibling.querySelector('td'); if(t.innerHTML.trim()){t.innerHTML=''; event.preventDefault();}">
                Configure
            </button>
            <button type="button" class="secondary"
                    hx-delete="/api/models/{{.ID}}/activate"
                    hx-target="#model-list"
                    hx-swap="innerHTML">
                Stop
            </button>
        </div>
        {{else}}
        <div role="group">
            <button type="button" class="outline"
                    hx-get="/api/models/{{.ID}}/config"
                    hx-target="next .config-cell"
                    hx-swap="innerHTML"
                    hx-on::before-request="let t=this.closest('tr').nextElementSibling.querySelector('td'); if(t.innerHTML.trim()){t.innerHTML=''; event.preventDefault();}">
                Configure
            </button>
            <button type="button"
                    hx-put="/api/models/{{.ID}}/activate"
                    hx-target="#model-list"
                    hx-swap="innerHTML">
                Start
            </button>
            <button type="button" class="outline secondary"
                    hx-delete="/api/models/{{.ID}}?keep_files=true"
                    hx-confirm="Remove this model from the registry? Files will be kept on disk."
                    hx-target="closest .model-row-group"
                    hx-swap="outerHTML">
                Remove
            </button>
            <button type="button" class="outline secondary"
                    hx-delete="/api/models/{{.ID}}"
                    hx-confirm="Delete this model and its files from disk?"
                    hx-target="closest .model-row-group"
                    hx-swap="outerHTML">
                Delete
            </button>
        </div>
        {{end}}
    </td>
</tr>
<tr><td colspan="5" class="config-cell"></td></tr>
</tbody>
{{end}}
