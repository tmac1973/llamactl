{{define "benchmark_form"}}
<article>
    <header>Run Benchmark</header>
    {{if not .Running}}
    <p>Start the server before running benchmarks.</p>
    {{else}}
    <form hx-post="/api/benchmarks"
          hx-target="#benchmark-progress"
          hx-swap="innerHTML">
        <div class="grid">
            <label title="Select an enabled model to benchmark. The model will be loaded automatically if not already in VRAM.">
                Model
                <select name="model_id" required>
                    {{range .Models}}
                    <option value="{{.ID}}">{{.ModelID}} ({{.Quant}}, {{printf "%.1f" (divGB .SizeBytes)}} GB)</option>
                    {{end}}
                </select>
            </label>
            <label>
                Preset
                <select name="preset" onchange="document.getElementById('preset-desc').textContent=this.options[this.selectedIndex].dataset.desc||'';">
                    {{range $i, $p := .Presets}}
                    <option value="{{$p.Name}}" data-desc="{{$p.Description}}" {{if eq $i 0}}data-initial="true"{{end}}>{{$p.Label}}</option>
                    {{end}}
                </select>
                <small id="preset-desc" style="color:var(--pico-muted-color);font-size:0.75rem;">
                    {{with index .Presets 0}}{{.Description}}{{end}}
                </small>
            </label>
            <label>
                &nbsp;
                <button type="submit" style="margin:0;white-space:nowrap;">Run Benchmark</button>
            </label>
        </div>
    </form>
    {{end}}
</article>
{{if .ActiveID}}
<script>
// A benchmark was already running when we loaded this tab. Reattach
// the progress UI by firing the same event the form submit fires.
document.body.dispatchEvent(new CustomEvent('benchmarkStarted', {
    detail: {id: {{.ActiveID}}}
}));
</script>
{{end}}
{{end}}
