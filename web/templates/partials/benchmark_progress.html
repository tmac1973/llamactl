{{define "benchmark_progress"}}
{{if eq .Status "running"}}
<div style="padding:0.75rem 1rem;border:1px solid var(--pico-muted-border-color);border-radius:0.25rem;margin-bottom:1rem;"
     hx-get="/api/benchmarks/{{.ID}}/progress"
     hx-trigger="every 2s"
     hx-target="#benchmark-progress"
     hx-swap="innerHTML">
    <span aria-busy="true" style="margin-right:0.5rem;"></span>
    {{if .Detail}}{{.Detail}}{{else}}Benchmark starting...{{end}}
</div>
{{else if eq .Status "completed"}}
<div style="padding:0.75rem 1rem;border:1px solid var(--pico-ins-color);border-radius:0.25rem;margin-bottom:1rem;"
     hx-trigger="load" hx-get="/api/benchmarks" hx-target="#benchmark-list" hx-swap="innerHTML">
    <ins>Benchmark complete!</ins>
</div>
{{else if eq .Status "failed"}}
<div style="padding:0.75rem 1rem;border:1px solid var(--pico-del-color);border-radius:0.25rem;margin-bottom:1rem;"
     hx-trigger="load" hx-get="/api/benchmarks" hx-target="#benchmark-list" hx-swap="innerHTML">
    <del>Benchmark failed:</del> {{.Error}}
</div>
{{end}}
{{end}}
