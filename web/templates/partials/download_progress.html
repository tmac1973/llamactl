{{define "download_progress"}}
<td colspan="6">
    <div hx-ext="sse"
         sse-connect="/api/hf/download/{{.DownloadID}}/progress"
         sse-swap="progress"
         hx-swap="innerHTML">
        <progress></progress>
        <small>Downloading {{.Filename}}...</small>
    </div>
</td>
{{end}}
