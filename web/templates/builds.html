{{define "content"}}
<h1>Builds</h1>

<article>
    <header>New Build</header>
    <form hx-post="/api/builds"
          hx-target="#build-output"
          hx-swap="innerHTML">
        <div class="grid">
            <label>
                Profile
                <select name="profile" id="build-profile"
                        hx-get="/api/builds/options"
                        hx-target="#build-options"
                        hx-swap="outerHTML"
                        hx-trigger="change, load">
                    {{range .Backends}}
                    {{if .Available}}
                    <option value="{{.Name}}">{{.Name}}{{if .Info}} ({{.Info}}){{end}}</option>
                    {{end}}
                    {{end}}
                </select>
            </label>
            <label>
                Git Ref
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <select name="git_ref" id="git-ref-select" style="margin:0;">
                        <option value="latest" selected>latest</option>
                    </select>
                    <button type="button" class="outline secondary"
                            style="margin:0;padding:0.25rem 0.75rem;font-size:0.85rem;white-space:nowrap;"
                            hx-get="/api/builds/refs?refresh=1"
                            hx-target="#git-ref-select"
                            hx-swap="innerHTML"
                            title="Fetch available tags from llama.cpp repo">
                        Refresh Tags
                    </button>
                </div>
            </label>
        </div>

        <div id="build-options">
            <!-- Populated by htmx when profile changes -->
        </div>

        <button type="submit">Start Build</button>
    </form>
</article>

<div id="build-output"></div>

<article>
    <header>Compiled Builds</header>
    <div id="build-list" hx-get="/api/builds" hx-trigger="load" hx-swap="innerHTML">
        Loading...
    </div>
</article>
{{end}}
