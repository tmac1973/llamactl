{{define "content"}}
<h1>Builds</h1>

<article>
    <header>New Build</header>
    <form hx-post="/api/builds"
          hx-target="#build-output"
          hx-swap="innerHTML">
        <div class="grid">
            <label>
                Profile
                <select name="profile" id="build-profile"
                        hx-get="/api/builds/options"
                        hx-target="#build-options"
                        hx-swap="outerHTML"
                        hx-trigger="change, load">
                    {{range .Backends}}
                    {{if .Available}}
                    <option value="{{.Name}}">{{.Name}}{{if .Info}} ({{.Info}}){{end}}</option>
                    {{end}}
                    {{end}}
                </select>
            </label>
            <label>
                Git Ref
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <select name="git_ref" id="git-ref-select" style="margin:0;"
                            onchange="var a=document.getElementById('ref-link');var v=this.value;if(v==='latest'){a.href='https://github.com/ggerganov/llama.cpp/releases/latest';}else{a.href='https://github.com/ggerganov/llama.cpp/releases/tag/'+v;}">
                        <option value="latest" selected>latest</option>
                    </select>
                    <a id="ref-link" href="https://github.com/ggerganov/llama.cpp/releases/latest"
                       target="_blank" rel="noopener"
                       style="margin:0;padding:0.25rem 0.75rem;font-size:0.85rem;white-space:nowrap;"
                       class="outline"
                       title="View release notes on GitHub">
                        Release Notes
                    </a>
                    <button type="button" class="outline secondary"
                            style="margin:0;padding:0.25rem 0.75rem;font-size:0.85rem;white-space:nowrap;"
                            hx-get="/api/builds/refs?refresh=1"
                            hx-target="#git-ref-select"
                            hx-swap="innerHTML"
                            hx-disabled-elt="this"
                            hx-indicator="this"
                            title="Pull latest tags from the llama.cpp remote">
                        Refresh Tags
                    </button>
                </div>
            </label>
        </div>

        <label title="Optional label appended to the build ID so multiple builds of the same ref+profile can coexist (e.g. 'rocwmma' or 'no-fattn'). Lowercase letters, digits, and hyphens. If left blank and a build with the same ref+profile already exists with different flags, a short hash of the flags is appended automatically.">
            Build Tag <small>(optional)</small>
            <input type="text" name="tag" placeholder="e.g. rocwmma" pattern="[a-z0-9][a-z0-9-]*" autocomplete="off">
        </label>

        <div id="build-options">
            <!-- Populated by htmx when profile changes -->
        </div>

        <button type="submit">Start Build</button>
    </form>
</article>

<div id="build-output"
     hx-get="/api/builds/active-log"
     hx-trigger="load"
     hx-swap="innerHTML">
</div>

<article>
    <header>Compiled Builds</header>
    <div id="build-list" hx-get="/api/builds" hx-trigger="load, buildsChanged from:body" hx-swap="innerHTML">
        Loading...
    </div>
</article>

<dialog id="build-info-modal" style="max-width:640px;">
    <article>
        <header>
            <button type="button" aria-label="Close" rel="prev"
                    onclick="this.closest('dialog').close();"></button>
            Build Info
        </header>
        <div id="build-info-modal-body">Loading...</div>
    </article>
</dialog>
{{end}}
