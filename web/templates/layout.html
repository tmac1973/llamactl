{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LlamaCtl{{if .Title}} — {{.Title}}{{end}}</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/htmx-sse.js"></script>
    <script src="/static/log-panel.js" defer></script>
    <style>
        body { display: flex; min-height: 100vh; margin: 0; }
        nav.sidebar {
            width: 220px;
            min-width: 220px;
            padding: 1rem;
            border-right: 1px solid var(--pico-muted-border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: stretch;
        }
        nav.sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        nav.sidebar li { padding: 0; }
        nav.sidebar a {
            display: block;
            padding: 0.4rem 0.6rem;
            border-radius: 0.25rem;
            text-decoration: none;
        }
        nav.sidebar a:hover { background: var(--pico-card-background-color); }
        nav.sidebar a[aria-current="page"] {
            font-weight: bold;
            background: var(--pico-primary-background);
            color: var(--pico-primary-inverse);
        }
        main { flex: 1; padding: 1.5rem; max-width: 1200px; overflow-y: auto; max-height: 100vh; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <hgroup>
            <h3>LlamaCtl</h3>
            <p>Inference Manager</p>
        </hgroup>
        <ul>
            <li><a href="/"{{if eq .Nav "home"}} aria-current="page"{{end}}>Dashboard</a></li>
            <li><a href="/builds"{{if eq .Nav "builds"}} aria-current="page"{{end}}>Builds</a></li>
            <li><a href="/models"{{if or (eq .Nav "models") (eq .Nav "service")}} aria-current="page"{{end}}>Models</a></li>
            <li><a href="/models/browse"{{if eq .Nav "browse"}} aria-current="page"{{end}}>Search HF</a></li>
            <li><a href="/settings"{{if eq .Nav "settings"}} aria-current="page"{{end}}>Settings</a></li>
        </ul>
        <div id="monitor-bar"
             hx-get="/api/monitor"
             hx-trigger="load, every 3s"
             hx-swap="innerHTML"
             style="font-size:0.75rem;opacity:0.8;border-top:1px solid var(--pico-muted-border-color);padding-top:0.5rem;">
        </div>
    </nav>
    <main class="container">
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
