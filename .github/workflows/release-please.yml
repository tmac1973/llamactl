name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Uses release-please-config.json + .release-please-manifest.json
          # in the repo root. release-please opens (and maintains) a release
          # PR on main; merging that PR creates the tag + GitHub Release,
          # which fires .github/workflows/release.yml to attach build
          # artifacts.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
