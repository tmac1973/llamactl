name: release

# One workflow for the full release pipeline:
#   1. release-please-action manages an open "release" PR on main with a
#      generated CHANGELOG.md. Merging that PR creates a tag and a GitHub
#      Release.
#   2. If release-please created a release on this run, goreleaser builds
#      the .deb/.rpm/tarballs and attaches them as assets.
#
# The two steps live in the same workflow because GitHub does NOT fire
# downstream workflows from events created by the default GITHUB_TOKEN
# (so a separate release-event-triggered workflow wouldn't run without
# a Personal Access Token). Keeping both jobs here uses release-please's
# action outputs to gate the build job, which works without a PAT.
#
# A workflow_dispatch input lets you (re)build a specific tag manually
# from the Actions UI — useful if a goreleaser job ever fails and you
# need to retry without waiting for another release PR.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    runs-on: ubuntu-latest
    needs: [release-please]
    # Run when:
    #   - push event AND release-please just created a release
    #   - manual dispatch (regardless of release-please's status)
    if: |
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Uncomment the line above and the brews block in
          # .goreleaser.yaml once the tap repo
          # (github.com/tmac1973/homebrew-llama-toolchest) exists and a
          # HOMEBREW_TAP_TOKEN PAT is set as a repo secret.
