name: release

# Fires on tag push. The tag is normally created by release-please when its
# release PR is merged (.github/workflows/release-please.yml), so the typical
# flow is: merge release PR → release-please creates v* tag + GitHub Release
# → this workflow runs goreleaser → goreleaser uploads .deb/.rpm/tarballs
# as assets on the existing release. Manual `git tag v* && git push --tags`
# also works as a fallback.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Uncomment the line above and the brews block in
          # .goreleaser.yaml once the tap repo
          # (github.com/tmac1973/homebrew-llama-toolchest) exists and a
          # HOMEBREW_TAP_TOKEN PAT is set as a repo secret.
