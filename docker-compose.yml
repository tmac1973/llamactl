services:
  llama-toolchest:
    build: .
    container_name: llama-toolchest
    ports:
      - "${LLAMACTL_PORT:-3000}:3000"   # Llama Toolchest management UI
      - "${LLAMACTL_INFERENCE_PORT:-8080}:8080"   # llama-server router (chat UI + inference)
    volumes:
      - llamactl-data:/data:z
    devices:
      - /dev/kfd:/dev/kfd       # AMD GPU kernel interface
      - /dev/dri:/dev/dri       # DRM render nodes
    group_add:
      - "${HOST_VIDEO_GID:-video}"
      - "${HOST_RENDER_GID:-render}"
    ipc: host                    # ROCm needs shared memory for GPU communication
    security_opt:
      - seccomp=unconfined      # required for ROCm
    ulimits:
      memlock:
        soft: -1
        hard: -1
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

volumes:
  llamactl-data:
    driver: local
